services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/AmazonSalesDB
      REDIS_URL: redis://redis:6379
      MONGO_DB_NAME: AmazonSalesDB
      MONGO_COLLECTION: sales_report
      ETL_SQL_CONNECTION_STRING: postgresql+psycopg2://postgres:postgres@postgres:5432/etl_db
      ETL_SQL_TABLE: sales_report
    depends_on:
      - mongodb
      - redis
      - postgres

  etl:
    build:
      context: .
      dockerfile: etl/Dockerfile
    profiles:
      - etl
    environment:
      MONGO_URI: mongodb://mongodb:27017/AmazonSalesDB
      ETL_SQL_CONNECTION_STRING: postgresql+psycopg2://postgres:postgres@postgres:5432/etl_db
    depends_on:
      - mongodb
      - postgres
    command: ["--help"]

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: etl_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mongo-data:
  postgres-data: